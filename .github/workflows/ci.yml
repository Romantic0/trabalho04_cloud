name: Pipeline de Integração Contínua (CI) - Marketplace API

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v3

    # Configura o Python no container do GitHub
    - name: Configurar Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Garante a instalação correta das dependências
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install flask pytest flake8

    # Etapa Adicional: Análise estática usando a chamada explícita do módulo
    - name: Executar Lint (Flake8)
      run: |
        python -m flake8 api/

    # Execução dos Testes usando a chamada explícita do módulo
    - name: Executar Testes Unitários com Pytest
      run: |
        python -m pytest api/tests/