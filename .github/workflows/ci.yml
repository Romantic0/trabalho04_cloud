name: Pipeline de Integração Contínua (CI) - Marketplace API

# Aciona o workflow em qualquer push para a branch main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Passo 1: Baixa o código do repositório
    - name: Checkout do código
      uses: actions/checkout@v3

    # Passo 2: Configura a versão do Python no ambiente virtual do GitHub
    - name: Configurar Python 3.10
      uses: actions/setup-python@v4
      with:
        python-python-version: '3.10'

    # Passo 3: Instala dependências da API e de testes
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install flask pytest flake8

    # Passo 4: Etapa Adicional - Análise Estática (Lint) para verificar boas práticas
    - name: Executar Lint (Flake8)
      run: |
        # para se houver erros de sintaxe ou indefinidos
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # Passo 5: Execução dos Testes Unitários Automatizados
    - name: Executar Testes Unitários com Pytest
      run: |
        pytest api/tests/