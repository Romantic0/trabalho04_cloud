name: Pipeline de Integração Contínua (CI) - Marketplace API

# Dispara o pipeline em qualquer push na branch main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Passo 1: Baixa o código atualizado do repositório utilizando v4 estável
    - name: Checkout do código
      uses: actions/checkout@v4

    # Passo 2: Configura o ambiente Python utilizando a v5 estável
    - name: Configurar Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Passo 3: Instalação limpa dos pacotes no ambiente virtual da nuvem
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install flask pytest flake8

    # Passo 4: Etapa Adicional - Análise Estática de Código (Lint)
    - name: Executar Lint (Flake8)
      run: |
        python -m flake8 api/

    # Passo 5: Execução automatizada da suíte de testes unitários
    - name: Executar Testes Unitários com Pytest
      run: |
        python -m pytest api/tests/